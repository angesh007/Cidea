<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PETS FROM HELL v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Permanent+Marker&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="chaos-layer"></div>
  <div id="destruction-overlay"></div>

  <!-- UI Header -->
  <div id="ui-header">
    <h1 id="title">🔥 PETS FROM HELL v2 🔥</h1>
    <div id="stats-bar">
      <span id="chaos-meter">CHAOS: <span id="chaos-val">0</span>%</span>
      <span id="spawn-btn" onclick="spawnPet()">+ SPAWN DEMON</span>
      <span id="nuke-btn" onclick="nukeAll()">☢ NUKE ALL</span>
    </div>
  </div>

  <!-- Pet Template -->
  <template id="pet-template">
    <div class="pet-container">
      <div class="pet-shadow"></div>
      <div class="pet-body">
        <canvas class="pet-canvas" width="130" height="130"></canvas>
        <div class="pet-emoji-face"></div>
      </div>
      <div class="pet-name-tag"></div>
      <div class="pet-speech-bubble"></div>
      <div class="hunger-bar-wrap">
        <div class="hunger-bar"></div>
      </div>
      <div class="pet-actions">
        <button class="btn-feed">🍖 FEED</button>
        <button class="btn-poke">👉 POKE</button>
        <button class="btn-zap">⚡ ZAP</button>
      </div>
    </div>
  </template>

  <!-- Sound Toggle -->
  <div id="sound-toggle" onclick="toggleSound()">🔊</div>

  <!-- Tooltip -->
  <div id="tooltip">Drag to pet • Feed • Ignore at your own risk...</div>

  <script src="pets.js"></script>
</body>
</html>
